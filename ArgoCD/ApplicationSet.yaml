apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app
  namespace: argocd   # MUST be argocd
spec:
  project: zudio     # Must match AppProject

  source:
    repoURL: https://github.com/rameshlinuxadmin/zudio.git
    targetRevision: main
    path: k8s   # Folder where your YAML/Helm exists

  destination:
    server: https://kubernetes.default.svc
    namespace: zudio 

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

